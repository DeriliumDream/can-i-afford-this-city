<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can I Afford This City?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
      <h1>Can I Afford This City?</h1>
      <p>Calculate your monthly budget.</p>
  
      <input type="number" id="income" placeholder="Monthly Income" />
  
      <input type="number" id="rent" placeholder="Monthly Rent" />
  
      <input type="number" id="food" placeholder="Food Expenses" />
  
      <input type="number" id="transport" placeholder="Transport Expenses" />
  
      <button onclick="calculateBudget()">Calculate</button>
  
      <h2 id="result"></h2>
    </div>
  
    <script src="script.js"></script>
</body>
</html>
